openapi: 3.1.0
info:
  title: OMO Boundary Operations API
  version: 0.1.0
  description: API contract for OMO 边界运维管理平台.
servers:
  - url: /
paths:
  /api/security/csrf:
    get:
      summary: Prepare browser CSRF token
      operationId: prepareCSRFToken
      responses:
        '200':
          description: CSRF cookie is ready for browser state-changing requests
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CSRFStatus'
  /api/bootstrap/status:
    get:
      summary: Get bootstrap status
      operationId: getBootstrapStatus
      responses:
        '200':
          description: Current bootstrap state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BootstrapStatus'
  /api/bootstrap/start:
    post:
      summary: Start bootstrap job
      operationId: startBootstrap
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapStartRequest'
      responses:
        '202':
          description: Bootstrap job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BootstrapStartResult'
  /api/bootstrap/events:
    get:
      summary: Stream bootstrap events
      operationId: streamBootstrapEvents
      responses:
        '200':
          description: Server-sent bootstrap events
          content:
            text/event-stream:
              schema:
                type: string
  /api/auth/login:
    post:
      summary: Log in administrator
      operationId: login
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResult'
  /api/auth/logout:
    post:
      summary: Log out administrator
      operationId: logout
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Logout result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - loggedOut
                        properties:
                          loggedOut:
                            type: boolean
  /api/auth/me:
    get:
      summary: Get current administrator session
      operationId: getCurrentAdminSession
      responses:
        '200':
          description: Current session state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionStatus'
  /api/system/overview:
    get:
      summary: Get system overview
      operationId: getSystemOverview
      responses:
        '200':
          description: System overview
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemOverview'
  /api/system/health:
    get:
      summary: Get system health
      operationId: getSystemHealth
      responses:
        '200':
          description: System health
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Health'
  /api/core/singbox/status:
    get:
      summary: Get sing-box core status
      operationId: getSingBoxStatus
      responses:
        '200':
          description: sing-box core installation and version status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SingBoxStatus'
  /api/services/profiles:
    get:
      summary: List service profile templates
      operationId: listServiceProfiles
      responses:
        '200':
          description: Backend-owned service profile templates available for managed access services
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServiceProfileList'
  /api/services:
    get:
      summary: List access services
      operationId: listServices
      responses:
        '200':
          description: Services
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServiceList'
    post:
      summary: Create access service
      operationId: createService
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServiceResult'
  /api/services/{id}:
    patch:
      summary: Update access service
      operationId: updateService
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdateRequest'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServiceResult'
  /api/services/{id}/apply:
    post:
      summary: Apply service configuration
      operationId: applyService
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '202':
          description: Apply job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServiceConfigJobResult'
  /api/services/{id}/rollback:
    post:
      summary: Roll back service configuration
      operationId: rollbackService
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '202':
          description: Rollback job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServiceConfigJobResult'
  /api/subscriptions:
    get:
      summary: List smart subscriptions
      operationId: listSubscriptions
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionList'
    post:
      summary: Create smart subscription
      operationId: createSubscription
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCreateRequest'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionTokenResult'
  /api/subscriptions/{id}/rotate:
    post:
      summary: Rotate subscription token
      operationId: rotateSubscription
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Token rotated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionTokenResult'
  /api/subscriptions/{id}:
    patch:
      summary: Update smart subscription metadata or status
      operationId: updateSubscription
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionUpdateRequest'
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionUpdateResult'
    delete:
      summary: Delete smart subscription
      operationId: deleteSubscription
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Subscription deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionDeleteResult'
  /s/{token}:
    get:
      summary: Public configuration distribution endpoint
      operationId: getSubscriptionByToken
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription content or adaptive import page
          content:
            text/html:
              schema:
                type: string
            application/json:
              schema:
                type: object
            text/plain:
              schema:
                type: string
            image/svg+xml:
              schema:
                type: string
  /api/diagnostics/run:
    post:
      summary: Run server checkup
      operationId: runDiagnostics
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '202':
          description: Diagnostic job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiagnosticsRunResult'
  /api/diagnostics/latest:
    get:
      summary: Get latest server checkup
      operationId: getLatestDiagnostics
      responses:
        '200':
          description: Latest diagnostic report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiagnosticsLatestResult'
  /api/diagnostics/events:
    get:
      summary: Stream diagnostic events
      operationId: streamDiagnosticEvents
      responses:
        '200':
          description: Server-sent diagnostic events
          content:
            text/event-stream:
              schema:
                type: string
  /api/pairing/code:
    post:
      summary: Create cascade pairing code
      operationId: createPairingCode
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairingCodeCreateRequest'
      responses:
        '201':
          description: Pairing code created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PairingCodeResult'
  /api/pairing/accept:
    post:
      summary: Accept cascade pairing code
      operationId: acceptPairingCode
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairingAcceptRequest'
      responses:
        '202':
          description: Pairing accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PairingAcceptResult'
  /api/pairing/exchange:
    post:
      summary: Exchange cascade trust with another OMO instance
      operationId: exchangePairingCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairingExchangeRequest'
      responses:
        '200':
          description: Pairing exchange completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PairingExchangeResult'
  /api/cascade/nodes:
    get:
      summary: List cascade nodes
      operationId: listCascadeNodes
      responses:
        '200':
          description: Cascade nodes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CascadeNodeList'
  /api/cascade/nodes/{id}:
    patch:
      summary: Update cascade node
      operationId: updateCascadeNode
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CascadeNodeUpdateRequest'
      responses:
        '200':
          description: Cascade node updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CascadeNodeResult'
    delete:
      summary: Delete cascade node
      operationId: deleteCascadeNode
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Cascade node deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CascadeNodeDeleteResult'
  /api/cascade/pairs/{id}/plan:
    post:
      summary: Generate one-hop cascade configuration plan
      operationId: planCascadePair
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Cascade configuration plan generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CascadeConfigPlanResult'
  /api/cascade/pairs/{id}/apply:
    post:
      summary: Apply one-hop cascade configuration after operator confirmation
      operationId: applyCascadePair
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CascadeConfigApplyRequest'
      responses:
        '202':
          description: Cascade configuration apply job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CascadeConfigApplyResult'
  /api/cascade/health/sample:
    post:
      summary: Sample live cascade link health
      operationId: sampleCascadeHealth
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '202':
          description: Cascade health sampling completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CascadeHealthSampleResult'
  /api/backups:
    get:
      summary: List backups
      operationId: listBackups
      responses:
        '200':
          description: Backups
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BackupListResult'
    post:
      summary: Create backup
      operationId: createBackup
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '202':
          description: Backup job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BackupCreateResult'
  /api/backups/{id}/restore:
    post:
      summary: Restore backup
      operationId: restoreBackup
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupRestoreRequest'
      responses:
        '202':
          description: Restore job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BackupRestoreResult'
  /api/update/check:
    get:
      summary: Check for update
      operationId: checkUpdate
      responses:
        '200':
          description: Update check result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpdateCheckResult'
  /api/update/apply:
    post:
      summary: Apply update
      operationId: applyUpdate
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplyRequest'
      responses:
        '202':
          description: Update job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpdateJobResult'
  /api/update/rollback:
    post:
      summary: Roll back update
      operationId: rollbackUpdate
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRollbackRequest'
      responses:
        '202':
          description: Rollback job accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpdateJobResult'
  /api/audit:
    get:
      summary: List audit logs
      operationId: listAuditLogs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuditListResult'
  /api/settings:
    get:
      summary: Get settings
      operationId: getSettings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SettingsResponse'
    patch:
      summary: Update settings
      operationId: updateSettings
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdateRequest'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SettingsResponse'
components:
  parameters:
    CSRFToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: Browser state-changing APIs must echo the readable omo_csrf cookie value.
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    Envelope:
      type: object
      required:
        - success
        - data
        - error
        - requestId
      properties:
        success:
          type: boolean
        data: true
        error:
          anyOf:
            - $ref: '#/components/schemas/APIError'
            - type: 'null'
        requestId:
          type: string
    APIError:
      type: object
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    CSRFStatus:
      type: object
      required:
        - csrfReady
      properties:
        csrfReady:
          type: boolean
    BootstrapStatus:
      type: object
      required:
        - state
        - initialized
        - phase1Complete
        - requiresToken
      properties:
        state:
          type: string
          enum:
            - UNINITIALIZED
            - PREFLIGHT_CHECK
            - ADMIN_CREATE
            - DOMAIN_VERIFY
            - TLS_PROVISION
            - PANEL_HTTPS_ENABLE
            - CORE_INSTALL
            - CORE_CONFIG_RENDER
            - SERVICE_PROFILE_CREATE
            - SUBSCRIPTION_CREATE
            - SECURITY_HARDEN
            - FINAL_HEALTH_CHECK
            - READY
        initialized:
          type: boolean
        phase1Complete:
          type: boolean
        requiresToken:
          type: boolean
        domain:
          type: string
        latestJob:
          anyOf:
            - $ref: '#/components/schemas/Job'
            - type: 'null'
        nextRequirement:
          type: string
        phase2Result:
          anyOf:
            - $ref: '#/components/schemas/Phase2Result'
            - type: 'null'
    BootstrapStartRequest:
      type: object
      required:
        - token
        - username
        - password
        - confirmPassword
        - domain
      properties:
        token:
          type: string
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 8
        confirmPassword:
          type: string
          minLength: 8
        domain:
          type: string
        retry:
          type: boolean
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    LoginResult:
      type: object
      required:
        - admin
      properties:
        admin:
          $ref: '#/components/schemas/AdminView'
    SessionStatus:
      type: object
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        admin:
          anyOf:
            - $ref: '#/components/schemas/AdminView'
            - type: 'null'
    AdminView:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
        username:
          type: string
    BootstrapStartResult:
      type: object
      required:
        - job
        - redirectTo
      properties:
        job:
          $ref: '#/components/schemas/Job'
        redirectTo:
          type: string
    Job:
      type: object
      required:
        - id
        - kind
        - state
        - status
        - progress
        - userMessage
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        kind:
          type: string
        state:
          type: string
        status:
          type: string
        progress:
          type: integer
        userMessage:
          type: string
        internalErrorCode:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
